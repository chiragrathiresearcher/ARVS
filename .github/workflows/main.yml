name: ARVS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  python-tests:
    name: Python Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy pandas matplotlib psutil pytest flake8

      - name: Lint (flake8)
        run: |
          flake8 ARVS/ simulation/ \
            --max-line-length=120 \
            --ignore=E203,W503,E501 \
            --exclude=simulation/outputs

      - name: Run test suite
        working-directory: ${{ github.workspace }}
        run: |
          pytest simulation/tests/test_arvs_full.py -v \
            --tb=short \
            --no-header \
            -q

  cpp-core-build:
    name: C++ Core Build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build g++-12

      - name: Configure standalone
        working-directory: cpp
        run: |
          cmake -B build \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-12 \
            -DBUILD_TESTING=OFF \
            -DARVS_STANDALONE=ON \
            -DCMAKE_CXX_FLAGS="-Wall -Wextra -fstack-protector-strong" \
            -DCMAKE_FIND_PACKAGE_NO_PACKAGE_REGISTRY=ON

      - name: Build arvs_core
        working-directory: cpp
        run: cmake --build build --parallel

      - name: Upload arvs_core
        uses: actions/upload-artifact@v4
        with:
          name: arvs-core-lib
          path: cpp/build/libarvs_core.a

  simulation:
    name: Simulation (16 scenarios)
    runs-on: ubuntu-22.04
    needs: python-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install numpy pandas matplotlib psutil

      - name: Run simulation
        working-directory: ${{ github.workspace }}
        run: python simulation/run_simulation.py

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: simulation-reports
          path: |
            simulation/outputs/reports/
            simulation/outputs/forensics/
